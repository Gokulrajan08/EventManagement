{% extends 'events/base.html' %}
{% block title %}Register — EventHub{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fa-solid fa-user-plus"></i></div>
      <h1>Create Account</h1>
      <p>Join EventHub and start exploring events</p>
    </div>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="username"><i class="fa-solid fa-user"></i> Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="email"><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label for="password1"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" id="password1" name="password1" placeholder="Create a strong password" required/>
      </div>
      <div class="form-group">
        <label for="password2"><i class="fa-solid fa-lock"></i> Confirm Password</label>
        <input type="password" id="password2" name="password2" placeholder="Repeat your password" required/>
      </div>
      <div class="form-group">
        <label><i class="fa-solid fa-id-badge"></i> I want to be a</label>
        <div class="role-selector">
          <label class="role-option">
            <input type="radio" name="role" value="participant" checked/>
            <span><i class="fa-solid fa-ticket"></i> Participant</span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="organizer"/>
            <span><i class="fa-solid fa-wand-magic-sparkles"></i> Organizer</span>
          </label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
