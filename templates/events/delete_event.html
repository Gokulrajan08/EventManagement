{% extends 'events/base.html' %}
{% block title %}Delete Event — EventHub{% endblock %}
{% block content %}
<div class="container page-top">
  <div class="confirm-card">
    <div class="confirm-icon danger"><i class="fa-solid fa-triangle-exclamation"></i></div>
    <h1>Delete Event</h1>
    <p>Are you sure you want to delete <strong>"{{ event.title }}"</strong>?</p>
    <p class="confirm-warning">This will also remove all registrations. This action cannot be undone.</p>
    <div class="confirm-actions">
      <a href="{% url 'event_detail' event.pk %}" class="btn btn-outline btn-lg">Cancel</a>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-lg"><i class="fa-solid fa-trash"></i> Yes, Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
